# Server config for candidate reward dataset generation.
# Assumes captions and caption embeddings have already been generated.
# Run: python3 scripts/generate_candidate_reward_dataset.py --config configs/server/generate_candidate_reward_dataset.yaml

episode_dir: data/openeqa_prepared/sample_episode
output: outputs/candidate_reward_dataset.jsonl
summary_output: outputs/candidate_reward_summary.json

runner: deepseek          # requires DEEPSEEK_API_KEY env var
model: deepseek-chat
max_output_tokens: 256

top_k: 3
seed: 42
limit: null               # null = process all questions

# SBERT embedding cache - must match the model used for caption_embeddings.npy
embedding_cache_dir: data/openeqa_prepared/sample_episode/embeddings/sentence-transformers_all-MiniLM-L6-v2
embedding_model: all-MiniLM-L6-v2

# Hard negative detection thresholds (SBERT cosine similarity)
hard_negative_min_score: 0.5
hard_negative_max_reward: 0.2
